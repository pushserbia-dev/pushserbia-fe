<main class="bg-black h-full min-h-screen flex items-center">
  <div class="grid max-w-screen-xl px-4 py-8 mx-auto lg:gap-20 lg:py-16 lg:grid-cols-12">
    <div class="w-full place-self-center lg:col-span-6">
      <div
        class="p-6 mx-auto bg-neutral-950 border border-white/5 rounded-lg shadow sm:max-w-xl sm:p-8"
      >
        <a routerLink="/" class="inline-flex items-center text-xl font-semibold text-white">
          <div class="flex items-center">
            <span class="mr-2 text-green-400 text-lg">git</span>
            <span class="text-xl font-bold">push Serbia</span>
          </div>
        </a>
        <h1 class="mt-6 text-2xl font-bold leading-tight tracking-tight text-white">
          Brzo i jednostavno
        </h1>
        <p class="mt-2 mb-8 text-sm font-light text-neutral-400">
          Nije potrebno da popunjavaš kojekakve forme, samo se uloguj sa svojim LinkedIn nalogom. A
          možeš pročitati i našu
          <a
            routerLink="/dokumentacija/politika-privatnosti"
            class="font-medium text-primary-400 hover:text-primary-300 hover:underline"
          >
            politiku privatnosti
          </a>
          koja je u skladu sa GDPR-om.
        </p>
        <a
          [href]="linkedinUrl"
          class="cursor-pointer scale-100 hover:scale-105 transition-transform"
        >
          <img
            src="/images/services/linkedin.png"
            alt="linkedin"
            width="430"
            height="80"
            class="h-12 w-auto"
          />
        </a>
      </div>
    </div>
    <div class="mr-auto place-self-center lg:col-span-6">
      <img
        class="hidden mx-auto lg:flex"
        src="/illustrations/login.svg"
        alt="Ilustracija developera koji radi za laptopom"
        width="573"
        height="600"
      />
    </div>
  </div>
</main>
