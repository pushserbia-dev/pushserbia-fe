<div class="rounded-lg border border-white/5 bg-neutral-900 p-4">
  <div class="mb-4 flex shrink-0 items-center space-x-2">
    <span class="text-white font-bold">Membership</span>
    <span
      class="rounded px-2.5 py-0.5 text-xs font-medium"
      [class]="badgeClass"
    >
      {{ statusLabel }}
    </span>
  </div>

  @if (isSupporter) {
    <p class="text-sm text-neutral-400 mb-4">
      Hvala na podršci! Tvoj doprinos pomaže zajednici da raste.
    </p>
    <button
      type="button"
      (click)="openMembership()"
      class="inline-flex items-center rounded-lg border border-white/10 bg-neutral-900 px-5 py-2.5 text-sm font-medium text-neutral-400 hover:bg-white/5 hover:text-white focus:z-10 focus:outline-none focus:ring-4 focus:ring-neutral-800"
    >
      <svg
        class="-ms-0.5 me-1.5 h-4 w-4"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"
        ></path>
      </svg>
      Upravljaj pretplatom
    </button>
  } @else {
    <p class="text-sm text-neutral-400 mb-4">
      Podrži zajednicu i postani član.
    </p>
    <button
      type="button"
      (click)="openMembership()"
      class="inline-flex items-center rounded-lg bg-primary-400 px-5 py-2.5 text-sm font-medium text-black hover:bg-primary-300 focus:z-10 focus:outline-none focus:ring-4 focus:ring-primary-800"
    >
      <svg
        class="-ms-0.5 me-1.5 h-4 w-4"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
        ></path>
      </svg>
      Postani Member
    </button>
  }
</div>
