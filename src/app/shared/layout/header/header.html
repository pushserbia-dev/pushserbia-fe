<header class="bg-black/80 backdrop-blur-md border-b border-white/5 sticky top-0 z-50">
  <div class="container mx-auto py-4 px-4 lg:px-8">
    <div class="flex justify-between items-center min-h-10">
      <a routerLink="/" class="flex items-center whitespace-nowrap">
        <span class="mr-1.5 text-primary-400 text-base font-mono">git</span>
        <span class="text-lg font-bold text-white">push Serbia</span>
      </a>

      <nav class="hidden md:flex items-center gap-8">
        <a
          routerLink="/projekti"
          routerLinkActive="text-white"
          class="text-sm text-neutral-400 hover:text-white transition-colors"
          >Projekti</a
        >
        <a
          routerLink="/blog"
          routerLinkActive="text-white"
          class="text-sm text-neutral-400 hover:text-white transition-colors"
          >Blog</a
        >
        <a
          routerLink="/dokumentacija/o-nama"
          routerLinkActive="text-white"
          class="text-sm text-neutral-400 hover:text-white transition-colors"
          >O nama</a
        >
      </nav>

      <div class="flex items-center gap-3">
        <!-- TODO: unhide when light theme is implemented -->
        <!-- <app-theme-switcher /> -->
        <app-user-widget />
        <button
          type="button"
          class="md:hidden p-1.5 text-neutral-400 hover:text-white transition-colors"
          (click)="toggleMobileMenu()"
          [attr.aria-expanded]="mobileMenuOpen()"
          aria-label="Meni"
        >
          <svg
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            aria-hidden="true"
          >
            @if (mobileMenuOpen()) {
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            } @else {
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
              />
            }
          </svg>
        </button>
      </div>
    </div>

    @if (mobileMenuOpen()) {
      <nav class="md:hidden mt-3 pt-3 border-t border-white/5 flex flex-col gap-1 pb-2">
        <a
          routerLink="/projekti"
          class="text-sm text-neutral-400 hover:text-white py-2 px-2"
          (click)="closeMobileMenu()"
          >Projekti</a
        >
        <a
          routerLink="/blog"
          class="text-sm text-neutral-400 hover:text-white py-2 px-2"
          (click)="closeMobileMenu()"
          >Blog</a
        >
        <a
          routerLink="/dokumentacija/o-nama"
          class="text-sm text-neutral-400 hover:text-white py-2 px-2"
          (click)="closeMobileMenu()"
          >O nama</a
        >
      </nav>
    }
  </div>
</header>
